[server]
# 배포 환경에서는 코드 핫리로드가 불필요하고,
# 파일 감시자가 transformers 내부 모듈을 스캔하며 경고를 쏟아내므로 비활성화
fileWatcherType = "none"

[theme]
# GRAYLUXE 스타일: 밝은 회색 베이스 + 부드러운 파랑 포인트
base = "light"
primaryColor = "#8FB9EA"             # 포인트: 소프트 블루
backgroundColor = "#DCDFE4"          # 본문: 회색 (기존 대비 ~10% 어둡게)
secondaryBackgroundColor = "#DCDFE4" # 사이드바: 본문과 동일 회색
textColor = "#2F3338"                # 글자: 차콜 그레이
